<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mountain Medicine Латали - Инвестиционная возможность</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  /* === RESET & BASE === */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0A0908;
    color: #F2EDE4;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  :root {
    --bg: #0A0908;
    --bg-alt: #131210;
    --bg-card: #1A1815;
    --gold: #C9A875;
    --gold-bright: #E5C896;
    --gold-dim: #8E764E;
    --cream: #F2EDE4;
    --muted: #8B847A;
    --line: #2A2722;
    --accent-red: #C13D2F;
  }

  /* === TYPOGRAPHY === */
  .display, h1, h2, h3 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  h1 { font-size: clamp(3rem, 8vw, 7rem); }
  h2 { font-size: clamp(2.2rem, 5vw, 4rem); margin-bottom: 1.5rem; }
  h3 { font-size: clamp(1.4rem, 3vw, 2rem); }
  
  .mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
  }
  
  p { color: var(--cream); opacity: 0.85; }
  .lead { font-size: 1.15rem; line-height: 1.7; max-width: 60ch; }

  /* === LAYOUT === */
  .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
  .container-tight { max-width: 960px; margin: 0 auto; padding: 0 2rem; }
  section { padding: 8rem 0; position: relative; }
  
  /* === NAV === */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.5rem 2rem;
    background: rgba(10, 9, 8, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    transition: all 0.3s ease;
  }
  .nav-inner { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
  .nav-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    color: var(--cream);
    letter-spacing: 0.02em;
  }
  .nav-brand span { color: var(--gold); font-style: italic; }
  .nav-links { display: flex; gap: 2.5rem; }
  .nav-links a {
    font-size: 0.85rem;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.3s;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .nav-links a:hover { color: var(--gold); }
  @media (max-width: 768px) { .nav-links { display: none; } }

  /* === HERO === */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 8rem 0 4rem;
    position: relative;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(ellipse at top right, rgba(201, 168, 117, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at bottom left, rgba(193, 61, 47, 0.05) 0%, transparent 50%);
    z-index: 0;
  }
  .hero-bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image: 
      linear-gradient(rgba(201, 168, 117, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201, 168, 117, 0.03) 1px, transparent 1px);
    background-size: 80px 80px;
  }
  .hero-content { position: relative; z-index: 1; }
  
  .hero-eyebrow { 
    margin-bottom: 2rem;
    display: flex; align-items: center; gap: 1rem;
    animation: fadeInUp 0.8s ease 0.2s both;
  }
  .hero-eyebrow::before {
    content: '';
    width: 60px; height: 1px; background: var(--gold);
  }
  .hero h1 {
    margin-bottom: 1.5rem;
    animation: fadeInUp 0.8s ease 0.4s both;
  }
  .hero h1 em { 
    font-style: italic; 
    color: var(--gold); 
    font-weight: 300;
  }
  .hero-sub {
    font-size: clamp(1.2rem, 2vw, 1.5rem);
    color: var(--cream);
    opacity: 0.7;
    max-width: 60ch;
    margin-bottom: 4rem;
    line-height: 1.5;
    animation: fadeInUp 0.8s ease 0.6s both;
  }
  
  .hero-kpis {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 3rem 0;
    animation: fadeInUp 0.8s ease 0.8s both;
  }
  @media (max-width: 768px) { .hero-kpis { grid-template-columns: 1fr; gap: 2rem; } }
  
  .kpi { padding-right: 2rem; border-right: 1px solid var(--line); }
  .kpi:last-child { border-right: none; }
  @media (max-width: 768px) { .kpi { border-right: none; border-bottom: 1px solid var(--line); padding-bottom: 1.5rem; } .kpi:last-child { border-bottom: none; } }
  
  .kpi-label { 
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }
  .kpi-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 5vw, 3.8rem);
    color: var(--gold-bright);
    line-height: 1;
    margin-bottom: 0.5rem;
    font-weight: 300;
  }
  .kpi-sub {
    font-size: 0.9rem;
    color: var(--muted);
    font-style: italic;
  }
  
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === SECTION HEADERS === */
  .section-eyebrow {
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .section-eyebrow::before {
    content: '';
    width: 40px; height: 1px; background: var(--gold);
  }
  
  /* === OPPORTUNITY SECTION === */
  .opportunity { background: var(--bg-alt); position: relative; }
  .opportunity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6rem;
    align-items: center;
  }
  @media (max-width: 900px) { .opportunity-grid { grid-template-columns: 1fr; gap: 3rem; } }
  
  .stat-block {
    border-left: 2px solid var(--gold);
    padding: 1.5rem 0 1.5rem 2rem;
    margin: 2.5rem 0;
  }
  .stat-block .number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem;
    color: var(--gold-bright);
    line-height: 1;
    font-weight: 300;
    display: block;
    margin-bottom: 0.5rem;
  }
  .stat-block .label {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.5;
  }
  
  /* Карточка-фото с подписью */
  .photo-card {
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    aspect-ratio: 4/3;
    background: var(--bg-card);
  }
  .photo-card img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.6s ease;
  }
